<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Chetan Sharma — a personal corner of the internet: the things I'm learning, making, and sharing." />
    <title>Chetan Sharma</title>
    <script>
      // Set theme before first paint to avoid a flash. Default: dark.
      try {
        var t = localStorage.getItem('theme');
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
